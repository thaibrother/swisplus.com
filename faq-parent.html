<style>
:root{--accent:#7b1fa2;--accent-light:#f3e5f5;--accent-glow:rgba(123,31,162,.10);--dark:#1a1a2e;--text:#222;--muted:#999;--bg:#faf5fc;--card:#fff;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--dark);padding:12px 24px;display:flex;align-items:center;gap:12px;color:#fff;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.topbar .logo{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff}
.topbar .brand{font-size:16px;font-weight:700}
.topbar .role-label{margin-left:auto;padding:5px 16px;border-radius:99px;background:var(--accent);font-size:13px;font-weight:600;color:#fff}

.center-stage.has-results{min-height:auto;justify-content:flex-start;padding-top:48px}
.search-brand{text-align:center;margin-bottom:32px;transition:all .4s ease}
.search-brand .icon{width:72px;height:72px;background:var(--accent);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;color:#fff;margin-bottom:16px}

.search-brand p{font-size:15px;color:var(--muted);font-weight:300}
.center-stage.has-results .search-brand{margin-bottom:20px}
.center-stage.has-results .search-brand .icon{width:48px;height:48px;font-size:22px;border-radius:14px;margin-bottom:10px}
.center-stage.has-results .search-brand h1{font-size:20px}
.center-stage.has-results .search-brand p{display:none}

.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow)}
.search-box::placeholder{color:#ccc}
.autocomplete{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #e0e0e0;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.10);max-height:380px;overflow-y:auto;display:none;z-index:200}
.ac-item{padding:12px 18px;cursor:pointer;font-size:14px;border-bottom:1px solid #f5f5f5;transition:background .15s}
.ac-item:hover{background:var(--accent-light)}
.ac-item .ac-cat{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;margin-right:8px}
.dept-filter{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px;width:100%;max-width:900px}
.dept-btn{padding:8px 16px;border-radius:99px;border:1.5px solid #e0e0e0;background:#fff;font-family:'Kanit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--text)}
.dept-btn:hover{border-color:var(--accent);color:var(--accent)}
.dept-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.hint-chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:20px;max-width:760px}
.hint-chip{padding:6px 14px;border-radius:99px;border:1px solid #e8e8e8;background:#fff;font-family:'Kanit',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s}
.hint-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.results{width:100%;max-width:800px;margin-top:24px;display:none}
.result-count{font-size:13px;color:var(--muted);margin-bottom:16px}
.cat-group{margin-bottom:24px}
.cat-label{font-size:14px;font-weight:600;color:var(--accent);padding:8px 16px;background:var(--accent-light);border-radius:10px;margin-bottom:10px}
.faq-item{background:var(--card);border-radius:var(--radius);padding:16px 20px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s}
.faq-item:hover{box-shadow:0 4px 20px rgba(0,0,0,.10)}
.faq-item .q{font-size:15px;font-weight:500;display:flex;align-items:flex-start;gap:10px}
.faq-item .q-cat{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;flex-shrink:0;margin-top:2px}
.faq-item .a{margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0;display:none}
.faq-item.open .a{display:block}
.report-link{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,#7b1fa2,#9c27b0);color:#fff;text-decoration:none;font-size:14px;font-weight:500;transition:all .2s;box-shadow:0 2px 8px rgba(123,31,162,.20)}
.report-link:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(123,31,162,.30)}
.no-results{text-align:center;padding:48px 24px;color:var(--muted)}
.no-results .icon{font-size:48px;margin-bottom:12px}
</style>

  { cat:"ค่าเทอม", q:"อัตราค่าธรรมเนียม รายการค่าใช้จ่าย และค่าใช้จ่ายเพิ่มเติมมีรายละเอียดอย่างไร?",

function norm(s) {
  return s.replace(/ฯ/g,'').replace(/\./g,'').toLowerCase().trim();
}

const faqNorm = FAQ.map(f => ({
  ...f,
  _s: norm(f.q + ' ' + f.tags)
}));

const searchBox = document.getElementById('searchBox');
const ac = document.getElementById('autocomplete');
const results = document.getElementById('results');
const stage = document.getElementById('stage');
const hintChips = document.getElementById('hintChips');
let activeDept = 'all';

document.querySelectorAll('.dept-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dept-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeDept = btn.dataset.dept;
    doSearch();
  });
});

document.querySelectorAll('.hint-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    searchBox.value = chip.textContent;
    ac.style.display = 'none';
    doSearch();
  });
});

searchBox.addEventListener('input', () => {
  const raw = searchBox.value.trim();
  if (!raw) {
    ac.style.display = 'none';
    results.style.display = 'none';
    stage.classList.remove('has-results');
    hintChips.style.display = 'flex';
    return;
  }
  const terms = norm(raw).split(/\s+/).filter(t=>t);
  let matches = faqNorm.filter(f => terms.every(t => f._s.includes(t)));
  if (activeDept !== 'all') matches = matches.filter(f => f.cat === activeDept);
  if (matches.length > 0 && matches.length <= 12) {
    ac.innerHTML = matches.map(m => `<div class="ac-item" data-q="${m.q}"><span class="ac-cat">${m.cat}</span>${m.q}</div>`).join('');
    ac.style.display = 'block';
    ac.querySelectorAll('.ac-item').forEach(item => {
      item.addEventListener('click', () => {
        searchBox.value = item.dataset.q;
        ac.style.display = 'none';
        doSearch();
      });
    });
  } else {
    ac.style.display = 'none';
  }
});

searchBox.addEventListener('keydown', e => {
  if (e.key === 'Enter') { ac.style.display = 'none'; doSearch(); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) ac.style.display = 'none';
});

function doSearch() {
  const raw = searchBox.value.trim();
  if (!raw && activeDept === 'all') {
    results.style.display = 'none';
    stage.classList.remove('has-results');
    hintChips.style.display = 'flex';
    return;
  }
  hintChips.style.display = 'none';
  stage.classList.add('has-results');
  let matches;
  if (raw) {
    const terms = norm(raw).split(/\s+/).filter(t=>t);
    matches = faqNorm.filter(f => terms.every(t => f._s.includes(t)));
  } else {
    matches = faqNorm.slice();
  }
  if (activeDept !== 'all') matches = matches.filter(f => f.cat === activeDept);
  if (matches.length === 0) {
    results.innerHTML = '<div class="no-results"><div class="icon">🔍</div><p>ไม่พบผลลัพธ์' + (raw ? 'สำหรับ "' + raw + '"' : '') + '</p><p style="font-size:13px;margin-top:8px">ลองเปลี่ยนคำค้นหา หรือเลือกหมวดหมู่</p></div>';
    results.style.display = 'block';
    return;
  }
  const grouped = {};
  matches.forEach(m => {
    if (!grouped[m.cat]) grouped[m.cat] = [];
    grouped[m.cat].push(m);
  });
  let html = `<div class="result-count">พบ ${matches.length} รายการ</div>`;
  for (const [cat, items] of Object.entries(grouped)) {
    html += `<div class="cat-group"><div class="cat-label">${cat} (${items.length})</div>`;
    items.forEach(item => {
      html += `<div class="faq-item" onclick="this.classList.toggle('open')"><div class="q"><span class="q-cat">${cat}</span>${item.q}</div><div class="a">${item.a}</div></div>`;
    });
    html += '</div>';
  }
  results.innerHTML = html;
  results.style.display = 'block';
}
</script>
</body>
</html>
