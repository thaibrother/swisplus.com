<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="dropShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="420" fill="#ffffff"/>

  <!-- Left side: On-Premise Server -->
  <g filter="url(#dropShadow)">
    <rect x="30" y="40" width="320" height="340" rx="15" fill="#fff0f0" stroke="#ffcccc" stroke-width="1"/>
    <!-- Server rack icon -->
    <g transform="translate(150, 70)">
      <rect x="0" y="0" width="60" height="90" rx="4" fill="none" stroke="#e74c3c" stroke-width="2"/>
      <rect x="5" y="15" width="50" height="8" fill="#e74c3c" rx="1"/>
      <rect x="5" y="30" width="50" height="8" fill="#e74c3c" rx="1"/>
      <rect x="5" y="45" width="50" height="8" fill="#e74c3c" rx="1"/>
      <rect x="5" y="60" width="50" height="8" fill="#e74c3c" rx="1"/>
      <rect x="5" y="75" width="50" height="8" fill="#e74c3c" rx="1"/>
    </g>
    <!-- Air conditioner icon -->
    <g transform="translate(210, 75)">
      <rect x="0" y="0" width="45" height="60" rx="4" fill="#0e1e3a"/>
      <circle cx="22.5" cy="15" r="3" fill="#f58220"/>
      <circle cx="22.5" cy="30" r="3" fill="#f58220"/>
      <circle cx="22.5" cy="45" r="3" fill="#f58220"/>
    </g>
    <text x="190" y="190" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#0e1e3a" text-anchor="middle">Buy expensive servers</text>
    <text x="190" y="215" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#0e1e3a" text-anchor="middle">24/7 air-conditioned room</text>
    <text x="190" y="240" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#0e1e3a" text-anchor="middle">Hire IT team</text>
    <text x="190" y="265" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#e74c3c" text-anchor="middle">Risk of data loss</text>
    <text x="190" y="290" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#0e1e3a" text-anchor="middle">Electricity + maintenance</text>
    <text x="190" y="330" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0e1e3a" text-anchor="middle">On-Premise Server</text>
  </g>

  <!-- Center: Arrow -->
  <g>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#f58220"/>
      </marker>
    </defs>
    <line x1="380" y1="210" x2="520" y2="210" stroke="#f58220" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="450" y="195" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#f58220" text-anchor="middle">Switch to</text>
    <text x="450" y="230" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#f58220" text-anchor="middle">SWIS Plus</text>
  </g>

  <!-- Right side: AWS Cloud -->
  <g filter="url(#dropShadow)">
    <rect x="550" y="40" width="320" height="340" rx="15" fill="#eafaf1" stroke="#a9dfbf" stroke-width="1"/>
    <!-- Cloud icon -->
    <g transform="translate(660, 70)">
      <path d="M 50 30 Q 70 20 80 35 Q 95 30 95 45 Q 95 65 75 75 L 25 75 Q 10 70 10 55 Q 10 40 25 35 Q 30 20 50 30" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
    </g>
    <text x="710" y="190" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#0e1e3a" text-anchor="middle">World-class AWS Cloud</text>
    <text x="710" y="215" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#0e1e3a" text-anchor="middle">No server purchase needed</text>
    <text x="710" y="240" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#0e1e3a" text-anchor="middle">Auto daily backup</text>
    <text x="710" y="265" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#27ae60" text-anchor="middle">Always up to date</text>
    <text x="710" y="290" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#0e1e3a" text-anchor="middle">Scale instantly</text>
    <text x="710" y="330" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0e1e3a" text-anchor="middle">AWS Cloud Infrastructure</text>
  </g>
</svg>