<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="Kanit, sans-serif">
  <defs>
    <filter id="ss"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.1"/></filter>
    <marker id="sArr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f58220"/>
    </marker>
    <marker id="sArrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  <!-- Timeline bar -->
  <rect x="40" y="20" width="720" height="40" rx="20" fill="#f7f7f7" stroke="#ececec" stroke-width="1.5"/>
  <text x="400" y="46" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">แผนงาน PDCA — ไทม์ไลน์กิจกรรมตลอดปี</text>
  <!-- Today marker -->
  <rect x="280" y="8" width="80" height="24" rx="12" fill="#f58220"/>
  <text x="320" y="25" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">วันนี้</text>
  <line x1="320" y1="32" x2="320" y2="60" stroke="#f58220" stroke-width="2"/>
  <!-- Supervision box -->
  <rect x="40" y="80" width="220" height="100" rx="16" fill="#1e3a5f" filter="url(#ss)"/>
  <text x="150" y="110" text-anchor="middle" fill="#f5a623" font-size="13" font-weight="700">ฝ่ายนิเทศติดตาม</text>
  <text x="150" y="132" text-anchor="middle" fill="#fff" font-size="12">เปิดดูทุกวัน:</text>
  <text x="150" y="152" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="11">ใคร? แผนไหน? หน่วยไหน?</text>
  <text x="150" y="170" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="11">ทำอะไร? ที่ไหน? อย่างไร?</text>
  <!-- Arrow to check -->
  <path d="M260 130 L320 130" stroke="#f58220" stroke-width="2.5" fill="none" marker-end="url(#sArr)"/>
  <!-- Check result -->
  <rect x="325" y="85" width="160" height="90" rx="16" fill="#fff" stroke="#0d9488" stroke-width="2" filter="url(#ss)"/>
  <text x="405" y="118" text-anchor="middle" fill="#0d9488" font-size="13" font-weight="600">ตรวจสอบ</text>
  <text x="405" y="140" text-anchor="middle" fill="#6b6b6b" font-size="11">ทำแล้ว ✓ → บันทึกผล</text>
  <text x="405" y="158" text-anchor="middle" fill="#dc2626" font-size="11">ยังไม่ทำ ✗ → เตือน</text>
  <!-- Arrow to warning -->
  <path d="M485 150 L540 150" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#sArrR)"/>
  <!-- Warning/reminder -->
  <rect x="545" y="85" width="210" height="90" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#ss)"/>
  <text x="650" y="115" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="600">⚠ เตือนวันต่อวัน</text>
  <text x="650" y="138" text-anchor="middle" fill="#6b6b6b" font-size="11">ติดตามอัตโนมัติ</text>
  <text x="650" y="156" text-anchor="middle" fill="#6b6b6b" font-size="11">จนกว่าจะดำเนินการ</text>
  <!-- Today's Events -->
  <rect x="200" y="210" width="400" height="55" rx="16" fill="#f58220" filter="url(#ss)"/>
  <text x="400" y="237" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">📢 Today's Events</text>
  <text x="400" y="256" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12">กิจกรรมจริงวันนี้ — ครบทุกคนทุกระดับ ถูกต้องแม่นยำ</text>
  <!-- Arrows down to Today's Events -->
  <path d="M150 180 L300 210" stroke="#1e3a5f" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <path d="M405 175 L400 210" stroke="#0d9488" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <path d="M650 175 L500 210" stroke="#dc2626" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
</svg>
