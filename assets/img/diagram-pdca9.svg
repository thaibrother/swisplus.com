<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 700" font-family="Kanit, sans-serif">
  <defs>
    <filter id="ds"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/></filter>
    <linearGradient id="pOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f58220"/><stop offset="100%" stop-color="#d96a0a"/>
    </linearGradient>
    <marker id="aN" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#1e3a5f"/>
    </marker>
    <marker id="aO" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#d96a0a"/>
    </marker>
    <marker id="aT" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#0d9488"/>
    </marker>
    <marker id="aP" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7c3aed"/>
    </marker>
    <marker id="aL" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7c3aed"/>
    </marker>
    <marker id="aM" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#f58220"/>
    </marker>
  </defs>

  <rect width="940" height="700" fill="#f8f9fa" rx="12"/>

  <!-- ══════ CENTER: PDCA ══════ -->
  <circle cx="470" cy="310" r="68" fill="url(#pOrange)" filter="url(#ds)"/>
  <text x="470" y="300" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">PDCA</text>
  <text x="470" y="324" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13" font-weight="500">9 ขั้นตอน</text>

  <!-- ══════ PLAN (navy #1e3a5f) — ขั้นที่ 1-5 ══════ -->

  <!-- P1: แต่งตั้งคณะกรรมการ -->
  <rect x="360" y="16" width="220" height="50" rx="14" fill="#1e3a5f" filter="url(#ds)"/>
  <text x="470" y="36" text-anchor="middle" fill="#f5a623" font-size="12" font-weight="700">1 — แต่งตั้ง</text>
  <text x="470" y="54" text-anchor="middle" fill="#fff" font-size="11">คณะกรรมการ/ทีมงาน/ผู้รับผิดชอบ</text>

  <!-- P2: ศึกษาข้อมูล สรุปสภาพปัจจุบัน -->
  <rect x="640" y="55" width="220" height="50" rx="14" fill="#1e3a5f" filter="url(#ds)"/>
  <text x="750" y="75" text-anchor="middle" fill="#f5a623" font-size="12" font-weight="700">2 — ศึกษาข้อมูล</text>
  <text x="750" y="93" text-anchor="middle" fill="#fff" font-size="11">สรุปสภาพปัจจุบัน</text>

  <!-- P3: ศึกษาเป้าหมายคุณภาพจากคู่มือคุณภาพหน่วยงาน -->
  <rect x="700" y="140" width="220" height="50" rx="14" fill="#1e3a5f" filter="url(#ds)"/>
  <text x="810" y="160" text-anchor="middle" fill="#f5a623" font-size="12" font-weight="700">3 — ศึกษาเป้าหมายคุณภาพ</text>
  <text x="810" y="178" text-anchor="middle" fill="#fff" font-size="11">จากคู่มือคุณภาพหน่วยงาน</text>

  <!-- P4: วางแนวทางปฏิบัติ กำหนดกิจกรรม/โครงการ -->
  <rect x="700" y="235" width="230" height="78" rx="14" fill="#1e3a5f" filter="url(#ds)"/>
  <text x="815" y="255" text-anchor="middle" fill="#f5a623" font-size="12" font-weight="700">4 — วางแนวทางปฏิบัติ</text>
  <text x="815" y="273" text-anchor="middle" fill="#fff" font-size="11">กำหนดกิจกรรม/โครงการ</text>
  <text x="815" y="291" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">4.1 กิจกรรม · 4.2 เครื่องมือประเมิน</text>
  <text x="815" y="305" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">4.3 แนวทางป้องกันแก้ไข (ตั้งต้นปี)</text>

  <!-- P5: ประชุมวางแผนและมอบหมายงาน -->
  <rect x="680" y="370" width="230" height="50" rx="14" fill="#1e3a5f" filter="url(#ds)"/>
  <text x="795" y="390" text-anchor="middle" fill="#f5a623" font-size="12" font-weight="700">5 — ประชุมวางแผน</text>
  <text x="795" y="408" text-anchor="middle" fill="#fff" font-size="11">มอบหมายงานตามข้อ 3</text>

  <!-- P flow arrows: 1→2→3→4→5 -->
  <path d="M580 42 Q610 44,640 66" stroke="#1e3a5f" stroke-width="2" fill="none" marker-end="url(#aN)"/>
  <path d="M820 105 Q825 122,820 140" stroke="#1e3a5f" stroke-width="2" fill="none" marker-end="url(#aN)"/>
  <path d="M825 190 Q822 212,822 235" stroke="#1e3a5f" stroke-width="2" fill="none" marker-end="url(#aN)"/>
  <path d="M815 313 Q810 340,808 370" stroke="#1e3a5f" stroke-width="2" fill="none" marker-end="url(#aN)"/>

  <!-- ══════ DO (orange #d96a0a) — ขั้นที่ 6 ══════ -->

  <!-- D6: ดำเนินการ mini-PDCA (ตลอดปี) -->
  <rect x="380" y="490" width="310" height="90" rx="14" fill="#d96a0a" filter="url(#ds)"/>
  <text x="535" y="516" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">6 — ดำเนินการ (ตลอดทั้งปี)</text>
  <text x="535" y="538" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">mini-PDCA ของแต่ละข้อในข้อ 4</text>
  <text x="535" y="564" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">6.1 ← 4.1 · 6.2 ← 4.2 · 6.3 ← 4.3 ···</text>

  <!-- P5→D6 arrow -->
  <path d="M740 420 Q670 460,630 490" stroke="#d96a0a" stroke-width="2.5" fill="none" marker-end="url(#aO)"/>

  <!-- ★★★ ข้อ 4 ↔ ข้อ 6 CONNECTION — 1:1 mapping ★★★ -->
  <path d="M700 290 C600 300, 520 380, 450 490"
        stroke="#f58220" stroke-width="2.5" fill="none" stroke-dasharray="7,4" opacity="0.5" marker-end="url(#aM)"/>
  <path d="M700 270 C610 270, 500 350, 420 490"
        stroke="#f58220" stroke-width="2.5" fill="none" stroke-dasharray="7,4" opacity="0.5"/>

  <!-- 4↔6 label -->
  <rect x="530" y="405" width="108" height="46" rx="10" fill="#fff3e0" stroke="#f58220" stroke-width="1.5"/>
  <text x="584" y="423" text-anchor="middle" fill="#d96a0a" font-size="10" font-weight="700">4.x → 6.x</text>
  <text x="584" y="439" text-anchor="middle" fill="#d96a0a" font-size="9">mini-PDCA 1:1</text>

  <!-- ══════ CHECK (teal #0d9488) — ขั้นที่ 7, 8 ══════ -->

  <rect x="80" y="500" width="220" height="54" rx="14" fill="#0d9488" filter="url(#ds)"/>
  <text x="190" y="522" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">7 — กำกับ ติดตาม</text>
  <text x="190" y="542" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">นิเทศการดำเนินงาน</text>

  <rect x="20" y="385" width="230" height="54" rx="14" fill="#0d9488" filter="url(#ds)"/>
  <text x="135" y="407" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">8 — ประเมินผล</text>
  <text x="135" y="427" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">การดำเนินงาน</text>

  <!-- D6→C7→C8 -->
  <path d="M380 540 Q310 540,300 530" stroke="#0d9488" stroke-width="2" fill="none" marker-end="url(#aT)"/>
  <path d="M160 500 Q150 460,148 439" stroke="#0d9488" stroke-width="2" fill="none" marker-end="url(#aT)"/>

  <!-- ══════ ACT (purple #7c3aed) — ขั้นที่ 9 ══════ -->

  <rect x="20" y="235" width="250" height="70" rx="14" fill="#7c3aed" filter="url(#ds)"/>
  <text x="145" y="262" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">9 — นำผลประเมิน</text>
  <text x="145" y="284" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">พัฒนาแผนปฏิบัติการปีต่อไป</text>

  <!-- C8→A9 -->
  <path d="M125 385 Q120 345,130 305" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#aP)"/>

  <!-- A9→P1 loop -->
  <path d="M210 235 C230 150,320 40,360 36" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-dasharray="6,4" marker-end="url(#aL)"/>
  <text x="265" y="108" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="500" opacity="0.8">วนรอบใหม่</text>

  <!-- ══════ LEGEND ══════ -->
  <rect x="38" y="38" width="14" height="14" rx="3" fill="#1e3a5f"/>
  <text x="58" y="50" fill="#1e3a5f" font-size="10" font-weight="600">PLAN — วางแผน (1-5)</text>
  <rect x="38" y="58" width="14" height="14" rx="3" fill="#d96a0a"/>
  <text x="58" y="70" fill="#d96a0a" font-size="10" font-weight="600">DO — ปฏิบัติ (6)</text>
  <rect x="38" y="78" width="14" height="14" rx="3" fill="#0d9488"/>
  <text x="58" y="90" fill="#0d9488" font-size="10" font-weight="600">CHECK — ตรวจสอบ (7-8)</text>
  <rect x="38" y="98" width="14" height="14" rx="3" fill="#7c3aed"/>
  <text x="58" y="110" fill="#7c3aed" font-size="10" font-weight="600">ACT — ปรับปรุง (9)</text>

  <!-- ══════ FOOTER ══════ -->
  <text x="470" y="645" text-anchor="middle" fill="#999" font-size="11">ข้อ 4 วางแนวทาง+กำหนดกิจกรรม (ต้นปี) → ข้อ 5 ประชุมมอบหมายงาน → ข้อ 6 ดำเนินการเป็น mini-PDCA ตลอดปี (4.x → 6.x)</text>
  <text x="470" y="668" text-anchor="middle" fill="#bbb" font-size="11">กระบวนการเขียนแผนงาน/โครงการ PDCA 9 ขั้นตอน — ใช้ตั้งแต่ปีการศึกษา 2555</text>
</svg>
