<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="Kanit, sans-serif">
  <defs>
    <linearGradient id="gOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f58220"/>
      <stop offset="100%" stop-color="#d96a0a"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="gNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0e1e3a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Box 1: แผนยุทธศาสตร์ -->
  <rect x="10" y="40" width="180" height="100" rx="16" fill="url(#gNavy)" filter="url(#shadow)"/>
  <text x="100" y="78" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">แผนยุทธศาสตร์</text>
  <text x="100" y="100" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">องค์กรต้นสังกัด</text>
  <text x="100" y="120" text-anchor="middle" fill="#f5a623" font-size="11" font-weight="500">ทิศทางใหญ่</text>
  <!-- Arrow 1 -->
  <path d="M195 90 L230 90" stroke="#f58220" stroke-width="3" fill="none" marker-end="url(#arrowOrange)"/>
  <defs><marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f58220"/></marker></defs>
  <!-- Box 2: คู่มือบริหารคุณภาพ -->
  <rect x="235" y="40" width="180" height="100" rx="16" fill="url(#gTeal)" filter="url(#shadow)"/>
  <text x="325" y="72" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">คู่มือบริหาร</text>
  <text x="325" y="92" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">คุณภาพโรงเรียน</text>
  <text x="325" y="120" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">สูตรที่ทุกคนมีส่วนร่วม</text>
  <!-- Arrow 2 -->
  <path d="M420 90 L455 90" stroke="#f58220" stroke-width="3" fill="none" marker-end="url(#arrowOrange)"/>
  <!-- Box 3: คู่มือคุณภาพหน่วยงาน -->
  <rect x="460" y="40" width="180" height="100" rx="16" fill="url(#gOrange)" filter="url(#shadow)"/>
  <text x="550" y="72" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">คู่มือคุณภาพ</text>
  <text x="550" y="92" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">หน่วยงาน</text>
  <text x="550" y="118" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12" font-weight="500">= Prompt</text>
  <!-- Arrow 3 -->
  <path d="M645 90 L680 90" stroke="#f58220" stroke-width="3" fill="none" marker-end="url(#arrowOrange)"/>
  <!-- Box 4: แผนงาน PDCA -->
  <rect x="685" y="40" width="180" height="100" rx="16" fill="#fff" stroke="#f58220" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="775" y="72" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">แผนงาน PDCA</text>
  <text x="775" y="92" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">9 ขั้นตอน</text>
  <text x="775" y="118" text-anchor="middle" fill="#f58220" font-size="12" font-weight="500">= Execute</text>
  <!-- Bottom: SWIS Platform bar -->
  <rect x="10" y="190" width="855" height="70" rx="16" fill="#f7f7f7" stroke="#ececec" stroke-width="1.5"/>
  <rect x="10" y="190" width="855" height="70" rx="16" fill="url(#gNavy)" opacity="0.06"/>
  <text x="450" y="220" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">SWIS Platform — ยึดโยงทุกอย่างเข้าด้วยกัน เก็บข้อมูล ติดตาม ประเมิน</text>
  <text x="450" y="245" text-anchor="middle" fill="#6b6b6b" font-size="12">ป้องกันการแก้ไขนอกระบบ • ผู้บริหารคนใหม่เห็นทันที • ตรวจสอบได้</text>
  <!-- Vertical connectors to platform -->
  <line x1="100" y1="140" x2="100" y2="190" stroke="#d96a0a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="325" y1="140" x2="325" y2="190" stroke="#d96a0a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="550" y1="140" x2="550" y2="190" stroke="#d96a0a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="775" y1="140" x2="775" y2="190" stroke="#d96a0a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Label -->
  <text x="450" y="300" text-anchor="middle" fill="#999" font-size="11">Chain of Alignment — ทุกชิ้นเชื่อมโยงกัน ไม่มีชิ้นไหนลอยอยู่เดี่ยว</text>
</svg>
