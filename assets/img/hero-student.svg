<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgG3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0fb"/><stop offset="100%" stop-color="#eee4f7"/>
    </linearGradient>
  </defs>

  <rect width="800" height="350" fill="url(#bgG3)"/>
  <circle cx="150" cy="80" r="55" fill="#8e44ad" opacity="0.08"/>
  <circle cx="700" cy="280" r="65" fill="#8e44ad" opacity="0.06"/>

  <!-- Phone -->
  <g>
    <rect x="120" y="70" width="220" height="260" rx="20" fill="#0e1e3a" filter="drop-shadow(0 16px 32px rgba(0,0,0,0.15))"/>
    <rect x="200" y="75" width="60" height="20" rx="10" fill="#0e1e3a"/>
    <rect x="130" y="90" width="200" height="230" rx="16" fill="#ffffff"/>
    <rect x="135" y="95" width="190" height="220" rx="14" fill="#f9f9f9"/>

    <!-- Header bar -->
    <rect x="135" y="95" width="190" height="45" fill="#8e44ad" rx="14"/>
    <rect x="135" y="126" width="190" height="14" fill="#8e44ad"/>
    <text x="230" y="123" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Timetable</text>

    <!-- Time slots -->
    <g transform="translate(140, 150)">
      <rect x="0" y="0" width="180" height="20" fill="#e8e8e8" rx="3"/>
      <text x="45" y="14" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#0e1e3a" font-weight="500">08:30 - 09:30</text>
      <rect x="0" y="25" width="180" height="20" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" rx="3"/>
      <text x="45" y="39" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#0e1e3a" font-weight="500">09:30 - 10:30</text>
      <rect x="0" y="50" width="180" height="20" fill="#8e44ad" opacity="0.15" rx="3"/>
      <text x="45" y="64" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#0e1e3a" font-weight="500">10:30 - 11:30</text>
      <rect x="0" y="75" width="180" height="20" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" rx="3"/>
      <text x="45" y="89" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#0e1e3a" font-weight="500">11:30 - 12:30</text>
    </g>
  </g>

  <!-- Parent figure -->
  <g transform="translate(380, 160)">
    <circle cx="0" cy="-8" r="10" fill="#8e44ad" opacity="0.85"/>
    <rect x="-8" y="2" width="16" height="12" fill="#8e44ad" opacity="0.7" rx="2"/>
    <line x1="-8" y1="6" x2="-14" y2="4" stroke="#8e44ad" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="6" x2="14" y2="4" stroke="#8e44ad" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -8 14 L -4 24 M 8 14 L 4 24" stroke="#8e44ad" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Student figure -->
  <g transform="translate(520, 160)">
    <circle cx="0" cy="-8" r="9" fill="#f58220" opacity="0.85"/>
    <rect x="-7" y="2" width="14" height="12" fill="#f58220" opacity="0.7" rx="2"/>
    <line x1="-7" y1="6" x2="-13" y2="4" stroke="#f58220" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="7" y1="6" x2="13" y2="4" stroke="#f58220" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -7 14 L -3 24 M 7 14 L 3 24" stroke="#f58220" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <line x1="400" y1="150" x2="510" y2="150" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Score badge -->
  <circle cx="420" cy="100" r="14" fill="#f58220" opacity="0.85"/>
  <text x="420" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">A</text>

  <!-- Homework icon -->
  <g transform="translate(560, 100)">
    <rect x="-10" y="-10" width="20" height="20" rx="2" fill="none" stroke="#8e44ad" stroke-width="2"/>
    <line x1="-6" y1="-4" x2="6" y2="-4" stroke="#8e44ad" stroke-width="1.5"/>
    <line x1="-8" y1="2" x2="8" y2="2" stroke="#8e44ad" stroke-width="1.5"/>
  </g>

  <!-- Family icon -->
  <g transform="translate(490, 250)">
    <circle cx="-8" cy="-6" r="3" fill="#8e44ad" opacity="0.8"/>
    <circle cx="8" cy="-6" r="3" fill="#8e44ad" opacity="0.8"/>
    <circle cx="0" cy="-4" r="2.5" fill="#f58220" opacity="0.8"/>
  </g>

  <!-- Schedule grid icon -->
  <g transform="translate(370, 250)">
    <rect x="-12" y="-10" width="24" height="20" rx="2" fill="none" stroke="#1abc9c" stroke-width="1.5"/>
    <line x1="-12" y1="-4" x2="12" y2="-4" stroke="#1abc9c" stroke-width="1.5"/>
    <line x1="-12" y1="2" x2="12" y2="2" stroke="#1abc9c" stroke-width="1.5"/>
    <line x1="-12" y1="8" x2="12" y2="8" stroke="#1abc9c" stroke-width="1.5"/>
  </g>

  <circle cx="350" cy="240" r="2.5" fill="#8e44ad" opacity="0.2"/>
  <circle cx="620" cy="220" r="3" fill="#f58220" opacity="0.15"/>

  <text x="400" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#0e1e3a" font-weight="bold">Student &amp; Parent — connecting school and family</text>
</svg>