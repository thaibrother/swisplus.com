<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ds">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="ob"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f58220"/><stop offset="100%" stop-color="#d96b1f"/>
    </linearGradient>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1e3a"/><stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
  </defs>

  <rect width="900" height="400" fill="#fafbfc" rx="16"/>

  <!-- Connection lines -->
  <line x1="450" y1="170" x2="175" y2="85" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="450" y1="170" x2="725" y2="85" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="450" y1="200" x2="175" y2="300" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="450" y1="200" x2="725" y2="300" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- CENTER: Student ID Card -->
  <g filter="url(#ds)">
    <rect x="340" y="115" width="220" height="150" rx="14" fill="url(#cg)"/>
    <!-- Photo placeholder -->
    <rect x="360" y="135" width="55" height="65" rx="8" fill="#fff" opacity="0.9"/>
    <circle cx="387" cy="155" r="15" fill="#ddd"/>
    <rect x="372" y="172" width="30" height="18" rx="6" fill="#ddd"/>
    <!-- Card text -->
    <text x="435" y="155" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#fff">STUDENT ID</text>
    <text x="435" y="178" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#fff" opacity="0.9">Digital Identity</text>
    <text x="435" y="198" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" opacity="0.8">SWIS Plus System</text>
    <!-- Chip -->
    <rect x="360" y="220" width="28" height="22" rx="4" fill="#ffd700" stroke="#e6b800" stroke-width="1"/>
    <line x1="364" y1="228" x2="384" y2="228" stroke="#e6b800" stroke-width="0.8"/>
    <line x1="364" y1="234" x2="384" y2="234" stroke="#e6b800" stroke-width="0.8"/>
    <!-- Barcode lines -->
    <g opacity="0.6">
      <rect x="430" y="218" width="3" height="26" fill="#fff"/>
      <rect x="436" y="218" width="2" height="26" fill="#fff"/>
      <rect x="441" y="218" width="4" height="26" fill="#fff"/>
      <rect x="448" y="218" width="2" height="26" fill="#fff"/>
      <rect x="453" y="218" width="3" height="26" fill="#fff"/>
      <rect x="459" y="218" width="2" height="26" fill="#fff"/>
      <rect x="464" y="218" width="4" height="26" fill="#fff"/>
      <rect x="471" y="218" width="2" height="26" fill="#fff"/>
      <rect x="476" y="218" width="3" height="26" fill="#fff"/>
      <rect x="482" y="218" width="2" height="26" fill="#fff"/>
      <rect x="487" y="218" width="4" height="26" fill="#fff"/>
      <rect x="494" y="218" width="2" height="26" fill="#fff"/>
      <rect x="499" y="218" width="3" height="26" fill="#fff"/>
      <rect x="505" y="218" width="2" height="26" fill="#fff"/>
      <rect x="510" y="218" width="4" height="26" fill="#fff"/>
      <rect x="517" y="218" width="3" height="26" fill="#fff"/>
      <rect x="523" y="218" width="2" height="26" fill="#fff"/>
      <rect x="528" y="218" width="4" height="26" fill="#fff"/>
      <rect x="535" y="218" width="2" height="26" fill="#fff"/>
      <rect x="540" y="218" width="3" height="26" fill="#fff"/>
    </g>
  </g>

  <!-- Feature 1: RFID (Top Left) -->
  <g filter="url(#ds)">
    <rect x="90" y="40" width="170" height="85" rx="14" fill="url(#dg)"/>
    <!-- Signal icon -->
    <path d="M140,60 a12,12 0 0,1 0,24" fill="none" stroke="#f58220" stroke-width="2.5" opacity="0.5"/>
    <path d="M135,53 a20,20 0 0,1 0,38" fill="none" stroke="#f58220" stroke-width="2.5" opacity="0.7"/>
    <path d="M130,46 a28,28 0 0,1 0,52" fill="none" stroke="#f58220" stroke-width="2.5"/>
    <circle cx="143" cy="72" r="4" fill="#f58220"/>
    <text x="175" y="70" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#fff">RFID</text>
    <text x="175" y="90" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" opacity="0.7">Tap to check in/out</text>
  </g>

  <!-- Feature 2: Face ID (Top Right) -->
  <g filter="url(#ds)">
    <rect x="640" y="40" width="170" height="85" rx="14" fill="url(#dg)"/>
    <!-- Face scan icon -->
    <path d="M690,55 L690,65 Q690,75 700,75 L710,75" fill="none" stroke="#f58220" stroke-width="2.5"/>
    <path d="M740,55 L740,65 Q740,75 730,75 L720,75" fill="none" stroke="#f58220" stroke-width="2.5"/>
    <path d="M690,100 L690,90 Q690,80 700,80 L710,80" fill="none" stroke="#f58220" stroke-width="2.5"/>
    <path d="M740,100 L740,90 Q740,80 730,80 L720,80" fill="none" stroke="#f58220" stroke-width="2.5"/>
    <circle cx="708" cy="68" r="2" fill="#f58220"/>
    <circle cx="722" cy="68" r="2" fill="#f58220"/>
    <path d="M708,76 Q715,82 722,76" fill="none" stroke="#f58220" stroke-width="1.5"/>
    <text x="760" y="75" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#fff">Face ID</text>
    <text x="760" y="95" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" opacity="0.7">Recognition</text>
  </g>

  <!-- Feature 3: Minimart (Bottom Left) -->
  <g filter="url(#ds)">
    <rect x="90" y="260" width="170" height="85" rx="14" fill="url(#dg)"/>
    <!-- Cart icon -->
    <circle cx="138" cy="318" r="4" fill="#f58220"/>
    <circle cx="158" cy="318" r="4" fill="#f58220"/>
    <path d="M120,282 L128,282 L140,310 L162,310" fill="none" stroke="#f58220" stroke-width="2.5"/>
    <path d="M132,292 L165,292 L160,310 L136,310 Z" fill="none" stroke="#f58220" stroke-width="2"/>
    <text x="175" y="295" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#fff">Minimart</text>
    <text x="175" y="315" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" opacity="0.7">Cashless payment</text>
  </g>

  <!-- Feature 4: Finance & Behavior (Bottom Right) -->
  <g filter="url(#ds)">
    <rect x="640" y="260" width="170" height="85" rx="14" fill="url(#dg)"/>
    <!-- Link chain icon -->
    <ellipse cx="700" cy="298" rx="14" ry="10" fill="none" stroke="#f58220" stroke-width="2.5" transform="rotate(-30, 700, 298)"/>
    <ellipse cx="720" cy="288" rx="14" ry="10" fill="none" stroke="#f58220" stroke-width="2.5" transform="rotate(-30, 720, 288)"/>
    <text x="750" y="290" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#fff">Finance</text>
    <text x="750" y="310" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#fff">&amp; Behavior</text>
    <text x="750" y="330" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" opacity="0.7">Linked system</text>
  </g>

  <!-- Bottom label -->
  <rect x="200" y="365" width="500" height="28" rx="8" fill="#f0f2f5"/>
  <text x="450" y="384" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#0e1e3a" text-anchor="middle">One card — connects finance, behavior, and student identity</text>
</svg>